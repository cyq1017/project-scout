name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Bootstrap development environment
        run: scripts/bootstrap-dev.sh

      - name: Run tests
        run: .venv/bin/python -m pytest
